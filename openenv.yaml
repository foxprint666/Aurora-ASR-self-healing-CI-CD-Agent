name: "aurora-asr-healing-agent"
version: "1.0.0"
description: "Self-healing CI/CD agent for autonomous code repair."
submission_type: "openenv-v4"
image: "aurora-asr-v1"
entrypoint: "python inference.py"
tasks:
  - id: "easy"
    path: "tasks/easy"
    description: "Simple syntax/NameError repair."
  - id: "medium"
    path: "tasks/medium"
    description: "Logic bug with failing tests."
  - id: "hard"
    path: "tasks/hard"
    description: "Complex multi-file logic repair."
